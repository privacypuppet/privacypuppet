<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield icon, centered at x=200 -->
  <g transform="translate(171, 6)" filter="url(#glow)">
    <!-- Shield shape: centered at cx=29, total width=58, height=64 -->
    <path d="M29 0 L58 10 L58 30 C58 48 44 60 29 64 C14 60 0 48 0 30 L0 10 Z"
          fill="#7c5cfc" opacity="0.18"/>
    <path d="M29 2 L55 11 L55 30 C55 46 42 57 29 62 C16 57 3 46 3 30 L3 11 Z"
          fill="none" stroke="#7c5cfc" stroke-width="2.5" opacity="0.85"/>
    <!-- Person silhouette -->
    <circle cx="29" cy="23" r="8.5" fill="#7c5cfc" opacity="0.95"/>
    <path d="M13 50 Q13 37 29 37 Q45 37 45 50" fill="#7c5cfc" opacity="0.95"/>
  </g>

  <!-- PrivacyPuppet wordmark — centered -->
  <text x="200" y="95"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Inter', sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#7c5cfc"
        filter="url(#glow)">PrivacyPuppet</text>

  <!-- Tagline — centered -->
  <text x="200" y="113"
        text-anchor="middle"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9.5"
        letter-spacing="2.5"
        fill="#a78bfa"
        opacity="0.6">INTERACTIVE 3D AVATAR</text>
</svg>
